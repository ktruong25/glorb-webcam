<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: transparent;
      -webkit-app-region: no-drag;
      user-select: none; -webkit-user-select: none;
    }
    .vignette {
      width: 100%; height: 100%;
      background: radial-gradient(ellipse at center,
        transparent 0%,
        rgba(0, 0, 0, 0.15) 40%,
        rgba(0, 0, 0, 0.65) 70%,
        rgba(0, 0, 0, 0.92) 100%
      );
      animation: close-in 60s linear forwards;
    }
    @keyframes close-in {
      from {
        background: radial-gradient(ellipse at center,
          transparent 0%,
          rgba(0, 0, 0, 0.05) 50%,
          rgba(0, 0, 0, 0.4)  75%,
          rgba(0, 0, 0, 0.75) 100%
        );
      }
      to {
        background: radial-gradient(ellipse at center,
          rgba(0, 0, 0, 0.5)  0%,
          rgba(0, 0, 0, 0.75) 40%,
          rgba(0, 0, 0, 0.92) 70%,
          rgba(0, 0, 0, 0.98) 100%
        );
      }
    }
  </style>
</head>
<body>
  <div class="vignette"></div>
</body>
</html>
