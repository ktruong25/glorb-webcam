<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: rgba(0, 0, 0, 0.92);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-font-smoothing: antialiased;
      -webkit-app-region: no-drag;
      user-select: none; -webkit-user-select: none;
      animation: fade-in 0.4s ease forwards;
    }
    @keyframes fade-in {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    .container {
      width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 48px;
    }
    .glorb-img {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      object-fit: cover;
      opacity: 0.7;
    }
    .heading {
      font-size: 28px;
      font-weight: 600;
      color: #f0f0f0;
      text-align: center;
      line-height: 1.25;
    }
    .sub {
      font-size: 15px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.5);
      text-align: center;
      line-height: 1.5;
      max-width: 360px;
    }
    .btn {
      margin-top: 8px;
      padding: 12px 36px;
      font-family: inherit;
      font-size: 15px;
      font-weight: 500;
      color: #171719;
      background: #f0f0f0;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 150ms ease, transform 100ms ease;
    }
    .btn:hover  { background: #ffffff; }
    .btn:active { transform: scale(0.97); }
  </style>
</head>
<body>
  <div class="container">
    <img class="glorb-img" src="glorb_dark.png" alt="Glorb">
    <p class="heading">You lost your focus.</p>
    <p class="sub">Your session has been ended. Take a breath, then start fresh when you're ready.</p>
    <button class="btn" id="btn-dismiss">Start over</button>
  </div>

  <script>
    document.getElementById('btn-dismiss').addEventListener('click', () => {
      window.glorb.strongTerminate()
    })
  </script>
</body>
</html>
